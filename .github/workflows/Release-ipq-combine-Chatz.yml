# 工作流可以定时自动编译所有设备，手动编译所有设备，手动选择编译设备。
# 工作流合并发布Release。

name: Release-IPQ-Auto-Chatz
run-name: Release - ${{ inputs.model || 'All Devices' }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: false
        description: Device Model (leave empty or select "ALL_DEVICES" to build all devices)
        type: choice
        default: ALL_DEVICES  # 默认编译所有设备
        options:
          - ALL_DEVICES
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - ipq60xx_immwrt_Pro
          - ipq60xx_immwrt_Max
          - ipq60xx_immwrt_Ultra
          - ipq60xx_libwrt_Pro
          - ipq60xx_libwrt_Max
          - ipq60xx_libwrt_Ultra

  schedule:
    # 每周五 00:00 北京时间 (UTC+8)
    - cron: '0 16 * * 5'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        model: [
          jdcloud_ipq60xx_immwrt,
          jdcloud_ipq60xx_libwrt,
          ipq60xx_immwrt_Pro,
          ipq60xx_immwrt_Max,
          ipq60xx_immwrt_Ultra,
          ipq60xx_libwrt_Pro,
          ipq60xx_libwrt_Max,
          ipq60xx_libwrt_Ultra
        ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free disk space
        uses: sbwml/actions@free-disk

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh )'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set execute permissions for scripts
        run: |
          chmod +x ./scripts/build_Chatz.sh
          chmod +x ./scripts/update.sh

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          
          # 判断是否是全部设备编译
          if [[ "${{ inputs.model }}" == "ALL_DEVICES" ]] || [[ "${{ inputs.model }}" == "" ]]; then
            export CURRENT_MODEL="${{ matrix.model }}"
          else
            export CURRENT_MODEL="${{ inputs.model }}"
          fi
          
          echo "CURRENT_MODEL=$CURRENT_MODEL" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./compilecfg/$CURRENT_MODEL.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./scripts/build_Chatz.sh ${{ env.CURRENT_MODEL }}

      - name: Get Kernel Version
        run: |
          # 获取内核版本
          echo "KVER=$(find ./action_build/dl -maxdepth 1 -name "linux-[4-6]\.*" | sort -r | head -n 1 | grep -oE "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Package OpenWrt Firmware
        if: ${{ env.CURRENT_MODEL == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y
          WHOAMI: Mary

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.111.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}')"  >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ env.CURRENT_MODEL }}
          files: |
            ./firmware/*.*
            ./merged_firmware/*.*
          body_path: ./release_body.txt
