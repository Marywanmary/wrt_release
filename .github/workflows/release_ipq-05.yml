# 脚本、配置、INI编号01，仅改名，做必要的路径修改。
# 脚本、配置、INI编号02，在build.sh修改，改名后输出固件和配置文件。
# 脚本、配置、INI编号03，修改工作流，保留手动触发单个设备编译，也有周五0点定时批量编译，批量编译使用独立TAG发布。
# 脚本、配置、INI编号04，修改工作流，保留手动触发单个设备编译，也有周五0点定时批量编译，批量编译使用合并发布。
# 脚本、配置、INI编号05，修改工作流，手动手动触发单个或者所有设备，也有周五0点定时批量编译，批量编译使用合并发布。

name: Release IPQ-05
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: all
        options:
          - all
          - ipq60xx_immwrt_Pro
          - ipq60xx_immwrt_Max
          - ipq60xx_immwrt_Ultra
          - ipq60xx_libwrt_Pro
          - ipq60xx_libwrt_Max
          - ipq60xx_libwrt_Ultra
  # 添加定时触发：北京时间每周五0点（UTC时间周四16点）
  schedule:
    - cron: '0 16 * * 4'  # 每周四16:00 UTC（北京时间周五0:00）

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  determine-models:
    runs-on: ubuntu-24.04
    outputs:
      models: ${{ steps.set-models.outputs.models }}
      is-all: ${{ steps.set-models.outputs.is-all }}
    steps:
      - name: Set models
        id: set-models
        run: |
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.model }}" == "all" ]; then
            echo "models=['ipq60xx_immwrt_Pro', 'ipq60xx_immwrt_Max', 'ipq60xx_immwrt_Ultra', 'ipq60xx_libwrt_Pro', 'ipq60xx_libwrt_Max', 'ipq60xx_libwrt_Ultra']" >> $GITHUB_OUTPUT
            echo "is-all=true" >> $GITHUB_OUTPUT
          else
            echo "models=['${{ github.event.inputs.model }}']" >> $GITHUB_OUTPUT
            echo "is-all=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: determine-models
    strategy:
      matrix:
        os: [ubuntu-24.04]
        model: ${{ fromJson(needs.determine-models.outputs.models) }}
      # 设置最大并行数，避免同时运行过多任务
      max-parallel: 3
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free disk space
        uses: sbwml/actions@free-disk

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo apt-get -yqq update
          sudo apt-get -yqq install dos2unix libfuse-dev build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc unzip python3-setuptools python3-pip
          sudo apt-get -yqq autoremove --purge
          sudo apt-get -yqq autoclean
          sudo apt-get -yqq clean

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Execute Permissions
        run: |
          echo "=== 设置执行权限 ==="
          find . -name "*.sh" -type f -exec sh -c 'head -n1 "$1" | grep -q "^#!/" && chmod +x "$1"' _ {} \;

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./compilecfg/${{ matrix.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./scripts/pre_clone_action05.sh ${{ matrix.model }}

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          # 使用芯片系列作为缓存键的一部分，同一个芯片系列共享缓存
          key: ${{ matrix.os }}-${{ hashFiles('**/chipset_flag') }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/chipset_flag') }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./scripts/build05.sh ${{ matrix.model }}

      - name: Get Kernel Version
        run: |
          # 获取内核版本
          echo "KVER=$(find ./action_build/dl -maxdepth 1 -name "linux-[4-6]\.*" | sort -r | head -n 1 | grep -oE "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/chipset_flag') }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.111.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware_${{ matrix.model }}/*.manifest | awk -F":" '{print $NF}')"  >> release_body.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-${{ matrix.model }}
          path: ./firmware_${{ matrix.model }}/*.*

  merge-release:
    if: needs.determine-models.outputs.is-all == 'true'
    needs: [determine-models, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: all-firmware

      - name: Merge firmware
        run: |
          mkdir -p merged-firmware
          # 将所有设备型号的固件合并到一个目录
          for dir in all-firmware/*; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* merged-firmware/
            fi
          done

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "构建日期: $(date '+%Y-%m-%d %H:%M:%S')" >> release_body.txt
          echo "包含设备型号: ipq60xx_immwrt_Pro, ipq60xx_immwrt_Max, ipq60xx_immwrt_Ultra, ipq60xx_libwrt_Pro, ipq60xx_libwrt_Max, ipq60xx_libwrt_Ultra" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.111.1" >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_DATE }}_all
          files: merged-firmware/*.*
          body_path: ./release_body.txt

  individual-release:
    if: needs.determine-models.outputs.is-all == 'false'
    needs: [determine-models, build]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        model: ${{ fromJson(needs.determine-models.outputs.models) }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: firmware-${{ matrix.model }}
          path: firmware

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：$(awk -F"=" '/REPO_URL/ {print $NF}' "./compilecfg/${{ matrix.model }}.ini")" >> release_body.txt
          echo "构建日期: $(date '+%Y-%m-%d %H:%M:%S')" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.111.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}')"  >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ matrix.model }}
          files: firmware/*.*
          body_path: ./release_body.txt