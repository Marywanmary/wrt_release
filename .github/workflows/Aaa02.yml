name: Auto AA-02
run-name: Auto Release - Arthur_Athena

on:
  workflow_run:
    workflows: ["Auto_Cleanup"]
    branches: [main]
    types:
      - completed
  schedule:
    # 每周四 16:00 UTC (北京时间周五 00:00)
    - cron: '0 16 * * 4'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_matrix:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        model: [Arthur_Athena_immwrt, Arthur_Athena_libwrt]
      fail-fast: false # 即使一个模型失败，也继续构建另一个

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
          remove-large-packages: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Cache
        uses: actions/cache/restore@v4
        id: cache_restore
        with:
          path: action_build
          key: openwrt-${{ matrix.model }}-${{ github.run_id }} # 使用 run_id 确保唯一性
          restore-keys: |
            openwrt-${{ matrix.model }}-

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion wget python3-distutils rsync gettext python3-pip unzip bzip2 file libssl-dev libelf-dev zstd zip libz-dev

      - name: Install pip packages
        run: |
          pip3 install tqdm pyelftools

      # --- 新增: 计算 config 文件的哈希值 ---
      - name: Calculate Config Hash
        id: config_hash
        run: |
          # 生成 config 文件的哈希值 (如果 config 文件存在)
          if [ -f "./configs/${{ matrix.model }}.config" ]; then
            CONFIG_HASH=$(sha256sum "./configs/${{ matrix.model }}.config" | awk '{print $1}')
            echo "CONFIG_HASH=$CONFIG_HASH" >> $GITHUB_ENV
            echo "hash=$CONFIG_HASH" >> $GITHUB_OUTPUT # 供后续步骤使用
          else
            echo "Config file ./configs/${{ matrix.model }}.config not found, using default hash."
            echo "CONFIG_HASH=default_hash_for_missing_config" >> $GITHUB_ENV
            echo "hash=default_hash_for_missing_config" >> $GITHUB_OUTPUT
          fi

      # --- 更新: 改进缓存恢复逻辑 ---
      - name: Restore Cache with Config Hash
        uses: actions/cache/restore@v4
        id: cache_restore_with_config
        with:
          path: |
            action_build
            !action_build/staging_dir/target*
          key: openwrt-${{ matrix.model }}-${{ env.CONFIG_HASH }}-${{ github.run_id }}
          restore-keys: |
            openwrt-${{ matrix.model }}-${{ env.CONFIG_HASH }}-
            openwrt-${{ matrix.model }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            echo "Refreshing cache stamps in staging_dir..."
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              if [ -d "$dir" ]; then # 再次检查目录是否存在
                echo "Touching files in $dir"
                find "$dir" -type f -exec touch {} + 2>/dev/null || echo "Warning: Could not touch files in $dir"
              fi
            done
            echo "Cache refresh completed."
          else
            echo "Warning: ./action_build/staging_dir not found, skipping cache refresh."
          fi

      # --- 修改: 改进 Build Firmware 步骤 ---
      - name: Build Firmware
        run: |
          if [ -f "./build.sh" ]; then
            chmod +x ./build.sh
            echo "Executing build.sh for model: ${{ matrix.model }}"
            # 执行 build.sh 并检查其退出码
            ./build.sh ${{ matrix.model }}
            BUILD_RESULT=$?
            if [ $BUILD_RESULT -ne 0 ]; then
              echo "Build script failed with exit code $BUILD_RESULT"
              exit 1 # 确保整个 job 因为构建失败而失败
            fi
            echo "Build script completed successfully."
          else
            echo "ERROR: build.sh not found at $(pwd)/build.sh"
            exit 1
          fi

      # --- 修改: 改进 Get Kernel Version 步骤 ---
      - name: Get Kernel Version
        run: |
          # 使用 find 命令搜索可能的内核目录
          KERNEL_DIR=$(find ./action_build/dl -maxdepth 1 -name "linux-*" -type d 2>/dev/null | head -n 1)
          if [ -n "$KERNEL_DIR" ]; then
            echo "Found kernel directory: $KERNEL_DIR"
            # 提取版本号
            KVER=$(basename "$KERNEL_DIR" | sed -n 's/linux-\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
            if [ -n "$KVER" ]; then
              echo "Detected Kernel Version: $KVER"
              echo "KVER=$KVER" >> $GITHUB_ENV
            else
              echo "WARNING: Could not extract version from directory name '$(basename "$KERNEL_DIR")'"
              echo "KVER=unknown" >> $GITHUB_ENV
            fi
          else
            echo "WARNING: No kernel directory found in ./action_build/dl"
            echo "KVER=unknown" >> $GITHUB_ENV
          fi

      # --- 新增: 删除旧缓存 (如果需要) ---
      - name: Delete Old Cache (Optional)
        run: |
          echo "Checking for old cache entries..."
          # 注意: 这里只是一个示例，实际删除逻辑取决于你如何管理缓存
          # 通常，使用带 restore-keys 的缓存机制会自动处理旧缓存
          echo "Old cache deletion step skipped (handled by cache restore keys)."

      # --- 修改: Upload artifacts 步骤 ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.model }}
          path: |
            ./action_build/logs/
            ./firmware/
            ./action_build/image/
            ./action_build/build_dir/
            ./action_build/staging_dir/
            ./configs/${{ matrix.model }}.config
            ./build.sh
          retention-days: 14 # 只保留 14 天

      # --- 修改: Create Release 步骤 ---
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./firmware/*.bin
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          body: |
            Build for ${{ matrix.model }} completed.
            Kernel Version: ${{ env.KVER }}
            Built on: ${{ github.event.repository.updated_at }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
